<style>
:root { color-scheme: dark; }
* { margin: 0; padding: 0; box-sizing: border-box; }
input, button, select, textarea { font-family: inherit; font-size: inherit; }
body {
  font-family: 'ZCOOL QingKe HuangYou', sans-serif;
  font-size: 12px;
  background: #020617;
  color: #e2e8f0;
  display: flex;
  height: 100vh;
  overflow: hidden;
}
body.font-en {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
}
.sidebar {
  width: 330px;
  min-width: 330px;
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: #0F172A;
  border-right: 1px solid #1E293B;
}
.panel {
  flex: 1;
  overflow-y: auto;
  padding: 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.card {
  background: #1E293B;
  border: 1px solid #334155;
  border-radius: 8px;
  padding: 14px 16px;

}
.card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.3); border-color: #475569; }
.card h3 {
  font-size: 14px; font-weight: 400; color: #e2e8f0;
  margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 1px solid #334155;
}
.param-group { display: flex; flex-direction: column; gap: 12px; }
.param-row { display: flex; flex-direction: column; gap: 3px; }
.param-row .label-row { display: flex; justify-content: space-between; align-items: center; }
.param-row label { font-size: 13px; font-weight: 600; color: #94a3b8; }
.param-row .spin-row { display: inline-flex; align-items: center; gap: 0; }
.param-row .spin-row button {
  width: 28px; height: 28px; padding: 0; font-size: 16px; font-weight: 700;
  border: 1px solid #475569; background: #1E293B; cursor: pointer; color: #cbd5e1;
  display: flex; align-items: center; justify-content: center; line-height: 1;
  user-select: none; transition: background 0.15s, border-color 0.15s;
}
.param-row .spin-row button:first-child { border-radius: 4px 0 0 4px; }
.param-row .spin-row button:last-child  { border-radius: 0 4px 4px 0; }
.param-row .spin-row button:hover { background: #334155; border-color: #22C55E; }
.param-row .spin-row button:active { background: #475569; }
.param-row .spin-row button:disabled { opacity: 0.3; cursor: default; }
.param-row .spin-row input[type=number] {
  font-family: inherit;
  width: 52px; height: 28px; padding: 0 4px; font-size: 13px; font-weight: 600;
  border: 1px solid #475569; border-left: none; border-right: none; text-align: center;
  font-variant-numeric: tabular-nums; color: #22C55E; border-radius: 0;
  background: #0F172A; -moz-appearance: textfield;
}
.param-row .spin-row input[type=number]::-webkit-outer-spin-button,
.param-row .spin-row input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.param-row .spin-row input[type=number]:focus { outline: none; background: #1E293B; }
.param-row input[type=range] { width: 100%; accent-color: #22C55E; margin-top: 3px; }
.range-hint { display: flex; justify-content: space-between; font-size: 10px; color: #64748b; padding: 0 2px; }
.derived-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; background: #0F172A; border-radius: 6px; border: 1px solid #334155;
  font-size: 13px; color: #94a3b8;
}
.derived-row .dv { font-weight: 700; color: #22C55E; font-variant-numeric: tabular-nums; font-size: 12px; }
.metric-card {
  padding: 9px 12px; border-radius: 6px; border: 1px solid #334155;
  display: flex; justify-content: space-between; align-items: center; font-size: 11px;
  background: #0F172A;
}
.metric-card .label { color: #94a3b8; }
.metric-card .value { font-weight: 700; font-variant-numeric: tabular-nums; font-size: 12px; color: #e2e8f0; }
.edge-legend { display: flex; gap: 16px; font-size: 11px; color: #64748b; padding: 6px 0; }
.edge-legend span { display: flex; align-items: center; gap: 4px; }
.edge-swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid #475569; }
.main-area { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 16px; overflow: auto; position: relative; background: #020617; }
.main-area h1 { font-size: 16px; color: #22C55E; margin-bottom: 14px; font-weight: 400; flex-shrink: 0; text-align: center; line-height: 1.6; letter-spacing: 1px; }
.canvas-wrap { border: 1px solid #334155; border-radius: 4px; box-shadow: 0 2px 12px rgba(0,0,0,0.4); background: #0F172A; flex-shrink: 0; transition: all 0.25s; }
.canvas-wrap.thumbnail {

<div class="main-area" id="mainArea">
  <h1 data-i18n="title">Pixel Ring · 像素圆环计算器</h1>
  <div class="font-toggle" id="fontToggle">
    <button id="btnFontZh" onclick="setFontMode('zh')">中</button>
    <button id="btnFontEn" onclick="setFontMode('en')">EN</button>
  </div>
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
  <div class="view3d-wrap" id="view3dWrap">
    <canvas id="canvas3d"></canvas>
    <div class="volume-overlay" id="volumeOverlay">
      <div class="vol-row"><span class="vol-label" data-i18n="ringVoxels">环带体素</span><span class="vol-val" id="volRing">—</span></div>
      <div class="vol-row"><span class="vol-label" data-i18n="innerVoxels">内部体素</span><span class="vol-val" id="volInner">—</span></div>
      <div class="vol-row vol-total"><span class="vol-label" data-i18n="totalVoxels">包围总体素</span><span class="vol-val" id="volTotal">—</span></div>
    </div>
  </div>
  <div class="info-bar" id="infoBar">鼠标悬停查看像素坐标 · 滚动查看大半径圆环</div>
</div>

<script>
const MIN_CELL = 5;
const BASE_TARGET = 800;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let rOuter = 10;
let thickness = 0;
let rInner = rOuter - thickness;
let showGrid = true;
let show3D = false;
let centerMode = 'odd';
let extrudeHeight = 50;
let solidMode3D = false;
let exportBgDark = true;

const numOuter = document.getElementById('rOuterNum');
const slOuter  = document.getElementById('rOuter');
const numThick = document.getElementById('thickNum');
const slThick  = document.getElementById('thickness');
const numHt    = document.getElementById('htNum');
const slHt     = document.getElementById('heightSlider');
const infoBar  = document.getElementById('infoBar');
const canvasWrap = document.querySelector('.canvas-wrap');
const view3dWrap = document.getElementById('view3dWrap');

function syncUI() {
  const tmax = rOuter === 1 ? 0 : Math.min(20, rOuter);
  slThick.max = tmax;
  numThick.max = tmax;
  if (thickness > tmax) { thickness = tmax; }
  numOuter.value = rOuter;
  slOuter.value = rOuter;
  numThick.value = thickness;
  slThick.value = thickness;
  const locked = rOuter === 1;
  slThick.disabled = locked;
  numThick.disabled = locked;
  document.getElementById('thickDec').disabled = locked;
  document.getElementById('thickInc').disabled = locked;
  const op = locked ? '0.4' : '1';
  slThick.style.opacity = op;
  numThick.style.opacity = op;
}

function recalc() {
  rInner = Math.max(0, rOuter - thickness);
  document.getElementById('rInnerDisplay').textContent = rInner;
}

let gridCount, cellPx, cx, cy, canvasSize;

function calcLayout() {
  let g = 2 * rOuter + 20;
  if (centerMode === 'odd' && g % 2 === 0) g++;
  if (centerMode === 'even' && g % 2 === 1) g++;
  gridCount = g;
  cellPx = Math.max(MIN_CELL, Math.floor(BASE_TARGET / gridCount));
  canvasSize = gridCount * cellPx;
  cx = gridCount / 2;
  cy = gridCount / 2;
  canvas.width = canvasSize;
  canvas.height = canvasSize;
}

function spin(which, delta) {
  if (which === 'outer') {
    let v = rOuter + delta;
    if (v < 1) v = 1;
    if (v > 100) v = 100;
    rOuter = v;
    syncUI();
  } else {
    const tmax = rOuter === 1 ? 0 : Math.min(20, rOuter);
    let v = thickness + delta;
    if (v < 0) v = 0;
    if (v > tmax) v = tmax;
    thickness = v;
    syncUI();
  }
  recalc();
  render();
}

numOuter.addEventListener('change', () => {
  let v = +numOuter.value;
  if (isNaN(v) || v < 1) v = 1;
  if (v > 100) v = 100;
  rOuter = v;
  syncUI();
  recalc();
  render();
});

numThick.addEventListener('change', () => {
  const tmax = rOuter === 1 ? 0 : Math.min(20, rOuter);
  let v = +numThick.value;
  if (isNaN(v) || v < 0) v = 0;
  if (v > tmax) v = tmax;
  thickness = v;
  syncUI();
  recalc();
  render();
});

// --- Midpoint Circle Algorithm ---
// Returns {boundary: Set of "dx,dy" strings, fillMax: array where fillMax[dy] = max x}
function midpointCircle(r) {
  const boundary = new Set();
  const fillMax = new Array(r + 1).fill(-1);

  if (r === 0) {
    boundary.add('0,0');
    fillMax[0] = 0;
    return { boundary, fillMax };
  }

  let x = 0, y = r;
  let d = 1 - r;

  while (x <= y) {
    // Record all 8 symmetric points
    const pts = [[x,y],[y,x]];
    for (const [px, py] of pts) {
      boundary.add(`${px},${py}`);
      if (fillMax[py] < px) fillMax[py] = px;
      if (fillMax[px] < py) fillMax[px] = py;
    }

    if (d < 0) {
      d += 2 * x + 3;
    } else {
      d += 2 * (x - y) + 5;
      y--;
    }
    x++;
  }
  return { boundary, fillMax };
}

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvasSize / rect.width;
  const scaleY = canvasSize / rect.height;
  const gx = Math.floor((e.clientX - rect.left) * scaleX / cellPx);
  const gy = Math.floor((e.clientY - rect.top) * scaleY / cellPx);
  if (gx < 0 || gy < 0 || gx >= gridCount || gy >= gridCount) return;
  const dx = Math.abs(gx - Math.floor(cx));
  const dy = Math.abs(gy - Math.floor(cy));
  const dist = Math.sqrt(dx * dx + dy * dy);
  let zone;
  if (thickness === 0) {
    zone = _outerBoundary.has(`${dx},${dy}`) ? '环带'
         : (dx <= _outerFill[dy]) ? '内部' : '外部';
  } else {
    const imx = (_innerFill[dy] ?? -1);
    zone = (imx >= 0 && dx <= imx) ? '内部'
         : (dx <= _outerFill[dy]) ? '环带' : '外部';
  }
  const edge = _outerBoundary.has(`${dx},${dy}`) ? ' · 边缘' : '';
  infoBar.textContent = `(${gx}, ${gy})  d=${dist.toFixed(1)}  ${zone}${edge}`;
});
canvas.addEventListener('mouseleave', () => {
  document.getElementById('infoBar').textContent = t('hoverHint');
});
