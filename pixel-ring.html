<style>
:root { color-scheme: dark; }
* { margin: 0; padding: 0; box-sizing: border-box; }
input, button, select, textarea { font-family: inherit; font-size: inherit; }
body {
  font-family: 'ZCOOL QingKe HuangYou', sans-serif;
  font-size: 12px;
  background: #020617;
  color: #e2e8f0;
  display: flex;
  height: 100vh;
  overflow: hidden;
}
body.font-en {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
}
.sidebar {
  width: 330px;
  min-width: 330px;
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: #0F172A;
  border-right: 1px solid #1E293B;
}
.panel {
  flex: 1;
  overflow-y: auto;
  padding: 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.card {
  background: #1E293B;
  border: 1px solid #334155;
  border-radius: 8px;
  padding: 14px 16px;

}
.card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.3); border-color: #475569; }
.card h3 {
  font-size: 14px; font-weight: 400; color: #e2e8f0;
  margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 1px solid #334155;
}
.param-group { display: flex; flex-direction: column; gap: 12px; }
.param-row { display: flex; flex-direction: column; gap: 3px; }
.param-row .label-row { display: flex; justify-content: space-between; align-items: center; }
.param-row label { font-size: 13px; font-weight: 600; color: #94a3b8; }
.param-row .spin-row { display: inline-flex; align-items: center; gap: 0; }
.param-row .spin-row button {
  width: 28px; height: 28px; padding: 0; font-size: 16px; font-weight: 700;
  border: 1px solid #475569; background: #1E293B; cursor: pointer; color: #cbd5e1;
  display: flex; align-items: center; justify-content: center; line-height: 1;
  user-select: none; transition: background 0.15s, border-color 0.15s;
}
.param-row .spin-row button:first-child { border-radius: 4px 0 0 4px; }
.param-row .spin-row button:last-child  { border-radius: 0 4px 4px 0; }
.param-row .spin-row button:hover { background: #334155; border-color: #22C55E; }
.param-row .spin-row button:active { background: #475569; }
.param-row .spin-row button:disabled { opacity: 0.3; cursor: default; }
.param-row .spin-row input[type=number] {
  font-family: inherit;
  width: 52px; height: 28px; padding: 0 4px; font-size: 13px; font-weight: 600;
  border: 1px solid #475569; border-left: none; border-right: none; text-align: center;
  font-variant-numeric: tabular-nums; color: #22C55E; border-radius: 0;
  background: #0F172A; -moz-appearance: textfield;
}
.param-row .spin-row input[type=number]::-webkit-outer-spin-button,
.param-row .spin-row input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.param-row .spin-row input[type=number]:focus { outline: none; background: #1E293B; }
.param-row input[type=range] { width: 100%; accent-color: #22C55E; margin-top: 3px; }
.range-hint { display: flex; justify-content: space-between; font-size: 10px; color: #64748b; padding: 0 2px; }
.derived-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; background: #0F172A; border-radius: 6px; border: 1px solid #334155;
  font-size: 13px; color: #94a3b8;
}
.derived-row .dv { font-weight: 700; color: #22C55E; font-variant-numeric: tabular-nums; font-size: 12px; }
.metric-card {
  padding: 9px 12px; border-radius: 6px; border: 1px solid #334155;
  display: flex; justify-content: space-between; align-items: center; font-size: 11px;
  background: #0F172A;
}
.metric-card .label { color: #94a3b8; }
.metric-card .value { font-weight: 700; font-variant-numeric: tabular-nums; font-size: 12px; color: #e2e8f0; }
.edge-legend { display: flex; gap: 16px; font-size: 11px; color: #64748b; padding: 6px 0; }
.edge-legend span { display: flex; align-items: center; gap: 4px; }
.edge-swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid #475569; }
.main-area { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 16px; overflow: auto; position: relative; background: #020617; }
.main-area h1 { font-size: 16px; color: #22C55E; margin-bottom: 14px; font-weight: 400; flex-shrink: 0; text-align: center; line-height: 1.6; letter-spacing: 1px; }
.canvas-wrap { border: 1px solid #334155; border-radius: 4px; box-shadow: 0 2px 12px rgba(0,0,0,0.4); background: #0F172A; flex-shrink: 0; transition: all 0.25s; }
.canvas-wrap.thumbnail {

<div class="main-area" id="mainArea">
  <h1 data-i18n="title">Pixel Ring · 像素圆环计算器</h1>
  <div class="font-toggle" id="fontToggle">
    <button id="btnFontZh" onclick="setFontMode('zh')">中</button>
    <button id="btnFontEn" onclick="setFontMode('en')">EN</button>
  </div>
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
  <div class="view3d-wrap" id="view3dWrap">
    <canvas id="canvas3d"></canvas>
    <div class="volume-overlay" id="volumeOverlay">
      <div class="vol-row"><span class="vol-label" data-i18n="ringVoxels">环带体素</span><span class="vol-val" id="volRing">—</span></div>
      <div class="vol-row"><span class="vol-label" data-i18n="innerVoxels">内部体素</span><span class="vol-val" id="volInner">—</span></div>
      <div class="vol-row vol-total"><span class="vol-label" data-i18n="totalVoxels">包围总体素</span><span class="vol-val" id="volTotal">—</span></div>
    </div>
  </div>
  <div class="info-bar" id="infoBar">鼠标悬停查看像素坐标 · 滚动查看大半径圆环</div>
</div>

<script>
const MIN_CELL = 5;
const BASE_TARGET = 800;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let rOuter = 10;
let thickness = 0;
let rInner = rOuter - thickness;
let showGrid = true;
let show3D = false;
let centerMode = 'odd';
let extrudeHeight = 50;
let solidMode3D = false;
let exportBgDark = true;

const numOuter = document.getElementById('rOuterNum');
const slOuter  = document.getElementById('rOuter');
const numThick = document.getElementById('thickNum');
const slThick  = document.getElementById('thickness');
const numHt    = document.getElementById('htNum');
const slHt     = document.getElementById('heightSlider');
const infoBar  = document.getElementById('infoBar');
const canvasWrap = document.querySelector('.canvas-wrap');
const view3dWrap = document.getElementById('view3dWrap');

function syncUI() {
  const tmax = rOuter === 1 ? 0 : Math.min(20, rOuter);
  slThick.max = tmax;
  numThick.max = tmax;
  if (thickness > tmax) { thickness = tmax; }
  numOuter.value = rOuter;
  slOuter.value = rOuter;
  numThick.value = thickness;
  slThick.value = thickness;
  const locked = rOuter === 1;
  slThick.disabled = locked;
  numThick.disabled = locked;
  document.getElementById('thickDec').disabled = locked;
  document.getElementById('thickInc').disabled = locked;
  const op = locked ? '0.4' : '1';
  slThick.style.opacity = op;
  numThick.style.opacity = op;
}

function recalc() {
  rInner = Math.max(0, rOuter - thickness);
  document.getElementById('rInnerDisplay').textContent = rInner;
}

let gridCount, cellPx, cx, cy, canvasSize;

function calcLayout() {
  let g = 2 * rOuter + 20;
  if (centerMode === 'odd' && g % 2 === 0) g++;
  if (centerMode === 'even' && g % 2 === 1) g++;
  gridCount = g;
  cellPx = Math.max(MIN_CELL, Math.floor(BASE_TARGET / gridCount));
  canvasSize = gridCount * cellPx;
  cx = gridCount / 2;
  cy = gridCount / 2;
  canvas.width = canvasSize;
  canvas.height = canvasSize;
}

function spin(which, delta) {
  if (which === 'outer') {
    let v = rOuter + delta;
    if (v < 1) v = 1;
    if (v > 100) v = 100;
    rOuter = v;
    syncUI();
  } else {
    const tmax = rOuter === 1 ? 0 : Math.min(20, rOuter);
    let v = thickness + delta;
    if (v < 0) v = 0;
    if (v > tmax) v = tmax;
    thickness = v;
    syncUI();
  }
  recalc();
  render();
}

numOuter.addEventListener('change', () => {
  let v = +numOuter.value;
  if (isNaN(v) || v < 1) v = 1;
  if (v > 100) v = 100;
  rOuter = v;
  syncUI();
  recalc();
  render();
});

numThick.addEventListener('change', () => {
  const tmax = rOuter === 1 ? 0 : Math.min(20, rOuter);
  let v = +numThick.value;
  if (isNaN(v) || v < 0) v = 0;

// --- Midpoint Circle Algorithm ---
// Returns {boundary: Set of "dx,dy" strings, fillMax: array where fillMax[dy] = max x}
function midpointCircle(r) {
  const boundary = new Set();
  const fillMax = new Array(r + 1).fill(-1);

  if (r === 0) {
    boundary.add('0,0');
    fillMax[0] = 0;
    return { boundary, fillMax };
  }

  let x = 0, y = r;
  let d = 1 - r;

  while (x <= y) {
    // Record all 8 symmetric points
    const pts = [[x,y],[y,x]];
    for (const [px, py] of pts) {
      boundary.add(`${px},${py}`);
      if (fillMax[py] < px) fillMax[py] = px;
      if (fillMax[px] < py) fillMax[px] = py;
    }

    if (d < 0) {
      d += 2 * x + 3;
    } else {
      d += 2 * (x - y) + 5;
      y--;
    }
    x++;
  }
  return { boundary, fillMax };
}

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvasSize / rect.width;
  const scaleY = canvasSize / rect.height;
  const gx = Math.floor((e.clientX - rect.left) * scaleX / cellPx);
  const gy = Math.floor((e.clientY - rect.top) * scaleY / cellPx);
  if (gx < 0 || gy < 0 || gx >= gridCount || gy >= gridCount) return;
  const dx = Math.abs(gx - Math.floor(cx));
  const dy = Math.abs(gy - Math.floor(cy));
  const dist = Math.sqrt(dx * dx + dy * dy);
  let zone;
  if (thickness === 0) {
    zone = _outerBoundary.has(`${dx},${dy}`) ? '环带'
         : (dx <= _outerFill[dy]) ? '内部' : '外部';
  } else {
    const imx = (_innerFill[dy] ?? -1);
    zone = (imx >= 0 && dx <= imx) ? '内部'
         : (dx <= _outerFill[dy]) ? '环带' : '外部';
  }
  const edge = _outerBoundary.has(`${dx},${dy}`) ? ' · 边缘' : '';
  infoBar.textContent = `(${gx}, ${gy})  d=${dist.toFixed(1)}  ${zone}${edge}`;
});

});

// Precomputed fill maps and boundary set for hover / render
let _outerFill = [];
let _innerFill = [];
let _outerBoundary = new Set();
let _innerBoundary = new Set();
let _ringCount = 0;

function render() {
  calcLayout();
  ctx.clearRect(0, 0, canvasSize, canvasSize);

  // Dark background fill
  const bgColor = _2dBgDark ? '#0F172A' : '#ffffff';
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, canvasSize, canvasSize);

  // Compute Midpoint circles
  const outerMC = rOuter > 0 ? midpointCircle(rOuter) : { boundary: new Set(), fillMax: [0] };
  const innerMC = (rInner > 0 && rInner < rOuter) ? midpointCircle(rInner) : { boundary: new Set(), fillMax: new Array(rOuter + 1).fill(-1) };

  _outerFill = outerMC.fillMax;
  _innerFill = innerMC.fillMax;
  _outerBoundary = outerMC.boundary;
  _innerBoundary = innerMC.boundary;

  const icx = Math.floor(cx);
  const icy = Math.floor(cy);

  let ringCount = 0, innerCount = 0, outerCount = 0;

  for (let gy = 0; gy < gridCount; gy++) {
    const ady = Math.abs(gy - icy);
    const inYRange = ady <= rOuter;
    const outerMaxX = inYRange ? _outerFill[ady] : -1;
    const innerMaxX = (inYRange && thickness > 0) ? (_innerFill[ady] ?? -1) : -1;

    for (let gx = 0; gx < gridCount; gx++) {
      const adx = Math.abs(gx - icx);
      const checker = (gx + gy) & 1;

      let color;
      let zone = 'outer';

      if (adx <= outerMaxX && outerMaxX >= 0) {
        if (thickness === 0) {
          // Ring is just the outer boundary
          if (_outerBoundary.has(`${adx},${ady}`)) {
            zone = 'ring';
          } else {
            zone = 'inner';
          }
        } else if (adx <= innerMaxX && innerMaxX >= 0) {
          zone = 'inner';
        } else {
          zone = 'ring';
        }
      }

      if (zone === 'inner') {
        innerCount++;
        color = checker ? '#a0d8f0' : '#8bc4de';
      } else if (zone === 'ring') {
        ringCount++;
        const onOuterEdge = _outerBoundary.has(`${adx},${ady}`);
        const onInnerEdge = thickness > 2 && _innerBoundary.has(`${adx},${ady}`);
        if (onOuterEdge) {
          color = checker ? '#ff9944' : '#ee8822';
        } else if (onInnerEdge) {
          color = checker ? '#ffdd44' : '#eebb33';
        } else {
          color = checker ? '#f0c060' : '#e0b050';
        }
      } else {
        outerCount++;
        color = checker ? (_2dBgDark ? '#1E293B' : '#eaeaea') : (_2dBgDark ? '#253349' : '#dedede');
      }

      const px = gx * cellPx;
      const py = gy * cellPx;
      ctx.fillStyle = color;
      ctx.fillRect(px, py, cellPx, cellPx);

      // Center marker
      if (centerMode === 'odd') {
        if (gx === icx && gy === icy) {
          ctx.fillStyle = _2dBgDark ? '#22C55E' : '#c02020';
          ctx.fillRect(px, py, cellPx, cellPx);
          ctx.fillStyle = _2dBgDark ? '#020617' : '#fff';
          const hw = Math.max(1, cellPx * 0.2);
          ctx.fillRect(px + cellPx/2 - hw/2, py, hw, cellPx);
          ctx.fillRect(px, py + cellPx/2 - hw/2, cellPx, hw);
        }
      } else {
        const c0 = icx - 1;
        if ((gx === c0 || gx === c0 + 1) && (gy === c0 || gy === c0 + 1)) {
          ctx.fillStyle = _2dBgDark ? 'rgba(34,197,94,0.4)' : 'rgba(192,32,32,0.35)';
          ctx.fillRect(px, py, cellPx, cellPx);
        }
      }
    }
  }

  // --- Axis dashed lines (2 on / 2 off, dark red overlay) ---
  const dashColor = ['#c84040', '#b03030'];
  for (let i = 1; i <= rOuter; i++) {
    const on = (i - 1) % 4 < 2; // 2 on, 2 off
    if (!on) continue;
    const checkerDash = i & 1;
    ctx.fillStyle = dashColor[checkerDash];

    const top    = icx * cellPx;
    const bottom = icx * cellPx;
    const left   = icy * cellPx;
    const right  = icy * cellPx;

    // +x (right)
    {
      const gx = icx + i;
      if (gx < gridCount) ctx.fillRect(gx * cellPx, icy * cellPx, cellPx, cellPx);
    }
    // -x (left)
    {
      const gx = icx - i;
      if (gx >= 0) ctx.fillRect(gx * cellPx, icy * cellPx, cellPx, cellPx);
    }
    // +y (down)
    {
      const gy = icy + i;
      if (gy < gridCount) ctx.fillRect(icx * cellPx, gy * cellPx, cellPx, cellPx);
    }
    // -y (up)
    {
      const gy = icy - i;
      if (gy >= 0) ctx.fillRect(icx * cellPx, gy * cellPx, cellPx, cellPx);
    }
  }

  // Grid overlay
  if (showGrid && cellPx >= 6) {
    ctx.strokeStyle = _2dBgDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= gridCount; i++) {
      const pos = i * cellPx;
      ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, canvasSize); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(canvasSize, pos); ctx.stroke();
    }
  }

  // --- Metrics ---
  _ringCount = ringCount;
  _innerCount = innerCount;
  document.getElementById('ringPixels').textContent = ringCount;
  document.getElementById('innerPixels').textContent = innerCount;
  document.getElementById('outerPixels').textContent = outerCount;

  updateVolumeOverlay();

  const ringAreaTheo = Math.PI * (rOuter * rOuter - rInner * rInner);
  if (thickness === 0 || ringAreaTheo <= 0) {
    document.getElementById('accuracy').textContent = '—';
  } else {
    const ratio = ringCount / ringAreaTheo;
    document.getElementById('accuracy').textContent = (ratio * 100).toFixed(1) + '%';
  }

  update3DIfNeeded();
}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let extrudeDepth = 50;
const DEFAULT_W = 520, DEFAULT_H = 450;

const canvas3d = document.getElementById('canvas3d');
canvas3d.width = DEFAULT_W;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#0F172A');

const camera = new THREE.PerspectiveCamera(45, DEFAULT_W / DEFAULT_H, 1, 2000);
camera.position.set(60, 50, 100);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// Lighting
scene.add(new THREE.AmbientLight('#ffffff', 1.5));
const key = new THREE.DirectionalLight('#ffffff', 2.0);
key.position.set(80, 120, 60);
scene.add(key);
const fill = new THREE.DirectionalLight('#8899cc', 0.8);
fill.position.set(-40, 20, -30);

gridHelper.position.z = 0;
scene.add(gridHelper);

// Coordinate axes group
let axesGroup = new THREE.Group();
scene.add(axesGroup);

function buildAxes(maxR) {
  while (axesGroup.children.length) axesGroup.remove(axesGroup.children[0]);

  const axisLen = Math.max(maxR + 8, 15);
  const cz = 0; // centroid at z=0
  const zHalf = extrudeDepth / 2;

  // X axis - red
  const xGeom = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-axisLen, 0, cz), new THREE.Vector3(axisLen, 0, cz)
  ]);
  axesGroup.add(new THREE.Line(xGeom, new THREE.LineBasicMaterial({ color: '#ff4444' })));
  const xTip = new THREE.ConeGeometry(1.2, 3, 8);
  const xArrow = new THREE.Mesh(xTip, new THREE.MeshBasicMaterial({ color: '#ff4444' }));
  xArrow.position.set(axisLen, 0, cz);
  xArrow.rotation.z = -Math.PI / 2;
  axesGroup.add(xArrow);

  // Y axis - green
  const yGeom = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, -axisLen, cz), new THREE.Vector3(0, axisLen, cz)
  ]);
  axesGroup.add(new THREE.Line(yGeom, new THREE.LineBasicMaterial({ color: '#44ff44' })));
  const yTip = new THREE.ConeGeometry(1.2, 3, 8);
  const yArrow = new THREE.Mesh(yTip, new THREE.MeshBasicMaterial({ color: '#44ff44' }));
  yArrow.position.set(0, axisLen, cz);
  yArrow.rotation.x = Math.PI / 2;
  axesGroup.add(yArrow);

  // Z axis - blue
  const zMin = -(zHalf + 5), zMax = zHalf + 5;
  const zGeom = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, zMin), new THREE.Vector3(0, 0, zMax)
  ]);
  axesGroup.add(new THREE.Line(zGeom, new THREE.LineBasicMaterial({ color: '#4488ff' })));
  const zTip = new THREE.ConeGeometry(1.2, 3, 8);
  const zArrow = new THREE.Mesh(zTip, new THREE.MeshBasicMaterial({ color: '#4488ff' }));
  zArrow.position.set(0, 0, zMax);
  axesGroup.add(zArrow);

  // Origin sphere
  const originGeo = new THREE.SphereGeometry(1.5, 16, 16);
  const originMesh = new THREE.Mesh(originGeo, new THREE.MeshBasicMaterial({ color: '#ffffff' }));
  originMesh.position.set(0, 0, cz);
  axesGroup.add(originMesh);
}

// --- Voxel materials (checkerboard per zone) ---
const boxGeo = new THREE.BoxGeometry(1, 1, 1);
const ringMatEven = new THREE.MeshStandardMaterial({ color: '#f0c060', metalness: 0.1, roughness: 0.6 });
const ringMatOdd  = new THREE.MeshStandardMaterial({ color: '#e0b050', metalness: 0.1, roughness: 0.6 });
const edgeMatEven = new THREE.MeshStandardMaterial({ color: '#ff9944', metalness: 0.1, roughness: 0.5, emissive: '#331100', emissiveIntensity: 0.3 });
const edgeMatOdd  = new THREE.MeshStandardMaterial({ color: '#ee8822', metalness: 0.1, roughness: 0.5, emissive: '#331100', emissiveIntensity: 0.3 });
const iEdgeMatEven = new THREE.MeshStandardMaterial({ color: '#ffdd44', metalness: 0.1, roughness: 0.5, emissive: '#332200', emissiveIntensity: 0.25 });
const iEdgeMatOdd  = new THREE.MeshStandardMaterial({ color: '#eebb33', metalness: 0.1, roughness: 0.5, emissive: '#332200', emissiveIntensity: 0.25 });
const innerMatEven = new THREE.MeshStandardMaterial({ color: '#a0d8f0', metalness: 0.05, roughness: 0.7, transparent: true, opacity: 0.85 });
const innerMatOdd  = new THREE.MeshStandardMaterial({ color: '#8bc4de', metalness: 0.05, roughness: 0.7, transparent: true, opacity: 0.85 });

function clearVoxels() {

  voxelGroups = [];

function buildVoxelRing(outerBoundary, innerBoundary, hasThickness, outerFill, innerFill, rOuter, rInner, solidMode) {
  clearVoxels();

  const re = [], ro = [], ee = [], eo = [], ie = [], io = [], ine = [], ino = [];

  for (let dy = 0; dy <= rOuter; dy++) {
    const outerMaxX = outerFill[dy];
    if (outerMaxX < 0) continue;

      if (solidMode && innerMaxX >= 0) {
        for (let dx = 0; dx <= innerMaxX; dx++) {
          addInnerColumn(dx, dy, ine, ino);
        }
      }
      // Ring band
      for (let dx = innerMaxX + 1; dx <= outerMaxX; dx++) {
        const onOuter = outerBoundary.has(`${dx},${dy}`);
        const onInner = (rOuter - rInner > 2) && innerBoundary && innerBoundary.has(`${dx},${dy}`);
        addColumn(dx, dy, onOuter, onInner, re, ro, ee, eo, ie, io);
      }
    } else {
      // thickness=0: inner = within outer fill but not boundary; ring = boundary only
      if (solidMode) {
        for (let dx = 0; dx <= outerMaxX; dx++) {
          if (outerBoundary.has(`${dx},${dy}`)) {
            addColumn(dx, dy, true, false, re, ro, ee, eo, ie, io);
          } else {
            addInnerColumn(dx, dy, ine, ino);
          }
        }
      } else {
        for (let dx = 0; dx <= outerMaxX; dx++) {
          if (outerBoundary.has(`${dx},${dy}`)) {
            addColumn(dx, dy, true, false, re, ro, ee, eo, ie, io);
          }
        }
      }
    }
  }

  // Create InstancedMesh per group
  const groups = [
    { arr: re, mat: ringMatEven },
    { arr: ro, mat: ringMatOdd },
    { arr: ee, mat: edgeMatEven },
    { arr: eo, mat: edgeMatOdd },
    { arr: ie, mat: iEdgeMatEven },
    { arr: io, mat: iEdgeMatOdd },
    { arr: ine, mat: innerMatEven },
    { arr: ino, mat: innerMatOdd },
  ];

  for (const { arr, mat } of groups) {
    if (arr.length === 0) continue;
    const im = new THREE.InstancedMesh(boxGeo, mat, arr.length);
    const dummy = new THREE.Object3D();
    for (let i = 0; i < arr.length; i++) {
      const [x, y, z] = arr[i];
      dummy.position.set(x, y, z);
      dummy.scale.set(1, 1, 1);
      dummy.updateMatrix();
      im.setMatrixAt(i, dummy.matrix);
    }
    im.instanceMatrix.needsUpdate = true;
    im.castShadow = true;
    im.receiveShadow = true;
    scene.add(im);
    voxelGroups.push(im);
  }
}

function addColumn(dx, dy, isOuterEdge, isInnerEdge, re, ro, ee, eo, ie, io) {
  // Mirror to all quadrants
  const mirrors = [];
  if (dx === 0 && dy === 0) {
    mirrors.push([0, 0]);
  } else if (dx === 0) {
    mirrors.push([0, dy], [0, -dy]);
  } else if (dy === 0) {
    mirrors.push([dx, 0], [-dx, 0]);
  } else {
    mirrors.push([dx, dy], [-dx, dy], [dx, -dy], [-dx, -dy]);
  }

  const zOffset = (extrudeDepth - 1) / 2; // center stack at z=0

  for (const [mx, my] of mirrors) {
    for (let z = 0; z < extrudeDepth; z++) {
      const checker = ((mx + my + z) & 1) ? 1 : 0;
      const zPos = z - zOffset;
      if (isOuterEdge) {
        checker ? eo.push([mx, my, zPos]) : ee.push([mx, my, zPos]);
      } else if (isInnerEdge) {
        checker ? io.push([mx, my, zPos]) : ie.push([mx, my, zPos]);
      } else {
        checker ? ro.push([mx, my, zPos]) : re.push([mx, my, zPos]);
      }
    }
  }
}

function addInnerColumn(dx, dy, ine, ino) {
  const mirrors = [];
  if (dx === 0 && dy === 0) {
    mirrors.push([0, 0]);
  } else if (dx === 0) {
    mirrors.push([0, dy], [0, -dy]);
  } else if (dy === 0) {
    mirrors.push([dx, 0], [-dx, 0]);
  } else {
    mirrors.push([dx, dy], [-dx, dy], [dx, -dy], [-dx, -dy]);
  }

  const zOffset = (extrudeDepth - 1) / 2;

  for (const [mx, my] of mirrors) {
    for (let z = 0; z < extrudeDepth; z++) {
      const checker = ((mx + my + z) & 1) ? 1 : 0;
      const zPos = z - zOffset;
      checker ? ino.push([mx, my, zPos]) : ine.push([mx, my, zPos]);
    }
  }
}

function getMaxR(outerBoundary) {
  let maxR = 0;
  for (const key of outerBoundary) {
    const [dx, dy] = key.split(',').map(Number);
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d > maxR) maxR = d;
  }
  return Math.ceil(maxR);
}

window.update3DGeometry = function(outerBoundary, innerBoundary, hasThickness, height, outerFill, innerFill, rOuter, rInner, solidMode) {
  if (height !== undefined && height !== extrudeDepth) {
    extrudeDepth = height;
    controls.target.set(0, 0, 0);
    controls.update();
  }

  buildVoxelRing(outerBoundary, innerBoundary, hasThickness, outerFill, innerFill, rOuter, rInner, solidMode);
  buildAxes(getMaxR(outerBoundary));

  // Update grid size
  const maxR = getMaxR(outerBoundary);
  const gs = Math.max(40, maxR * 2 + 20);
  scene.remove(gridHelper);
  gridHelper.geometry.dispose();
  gridHelper = new THREE.GridHelper(gs, Math.floor(gs / 5), '#444466', '#222244');
  gridHelper.position.z = 0;
  scene.add(gridHelper);
};

window.setExtrudeHeight = function(h) {
  extrudeDepth = h;
  controls.target.set(0, 0, 0);
  controls.update();
};

function resize3DCanvas() {
  const wrap = document.getElementById('view3dWrap');
  if (!wrap.classList.contains('expanded')) return;
  const rect = wrap.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  if (w <= 0 || h <= 0) return;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

window.toggle3DView = function(visible) {
  const wrap = document.getElementById('view3dWrap');
  wrap.classList.toggle('visible', visible);
  wrap.classList.toggle('expanded', visible);
  document.getElementById('btn3DReset').disabled = !visible;
  if (visible) {
    requestAnimationFrame(() => {
      resize3DCanvas();
      requestAnimationFrame(() => resize3DCanvas());
    });
  } else {
    renderer.setSize(DEFAULT_W, DEFAULT_H);
    camera.aspect = DEFAULT_W / DEFAULT_H;
    camera.updateProjectionMatrix();
  }
};

window.reset3DView = function() {
  camera.position.set(60, 50, 100);
  controls.target.set(0, 0, 0);
  controls.update();
};

const resizeObserver = new ResizeObserver(() => {
  if (document.getElementById('view3dWrap').classList.contains('expanded')) {
    resize3DCanvas();
  }
});
resizeObserver.observe(document.getElementById('view3dWrap'));

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

buildAxes(0);
window._3dReady = true;
</script>
</body>
